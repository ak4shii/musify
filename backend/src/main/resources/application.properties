spring.application.name=backend

logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
logging.level.root=${LOG_LEVEL:INFO}
logging.file.name=${LOG_FILE_NAME:src/main/resources/log/app.log}

spring.datasource.url=jdbc:postgresql://localhost:5433/musify_db
spring.datasource.username=postgres
spring.datasource.password=admin

spring.datasource.hikari.data-source-properties.options=-c TimeZone=Asia/Ho_Chi_Minh
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'Asia/Ho_Chi_Minh'
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never

management.endpoint.health.show-details=always
management.endpoints.web.base-path=/musify/actuator
management.endpoints.web.exposure.include=*
management.endpoint.configprops.show-values=always
management.endpoint.env.show-values=always
management.info.env.enabled=true

info.app.name=${spring.application.name}
info.app.description=Backend Project For Musify Application
info.app.version=1.0.0
info.app.contact.email=monika142209@gmail.com

spring.web.resources.static-locations=classpath:/
spring.mvc.static-path-pattern=/**

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.max-size=10485760