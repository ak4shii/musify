version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: musify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: musify_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      PGTZ: Asia/Ho_Chi_Minh
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/main/resources/sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - musify-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: musify-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/musify_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      TZ: Asia/Ho_Chi_Minh
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - musify-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: musify-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - musify-network

volumes:
  postgres_data:
    driver: local

networks:
  musify-network:
    driver: bridge
